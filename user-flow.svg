<svg width="680" height="1580" viewBox="0 0 680 1580" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 600; }
      .ts { font-size: 12px; font-weight: 400; fill: #555555; }
      .tph { font-size: 11px; font-weight: 500; fill: #999999; }
      .arr { stroke: #aaaaaa; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="1580" fill="#fafafa"/>

  <!-- PHASE BANDS -->
  <rect x="0" y="40" width="680" height="104" fill="#f5f5f5"/>
  <rect x="0" y="180" width="680" height="244" fill="#fffbf0"/>
  <rect x="0" y="424" width="680" height="260" fill="#f5f5f5"/>
  <rect x="0" y="684" width="680" height="330" fill="#f5f5f5"/>
  <rect x="0" y="1014" width="680" height="290" fill="#fffbf0"/>
  <rect x="0" y="1304" width="680" height="240" fill="#f5f5f5"/>

  <!-- PHASE LABELS -->
  <text class="tph" x="16" y="100">ENTRY</text>
  <text class="tph" x="16" y="310">INTENT</text>
  <text class="tph" x="16" y="560">BAN PHASE</text>
  <text class="tph" x="16" y="860">PICK PHASE</text>
  <text class="tph" x="16" y="1160">POST-LOCK</text>
  <text class="tph" x="16" y="1430">INTO GAME</text>

  <!-- PHASE DIVIDERS -->
  <line x1="56" y1="144" x2="648" y2="144" stroke="#dddddd" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="56" y1="424" x2="648" y2="424" stroke="#dddddd" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="56" y1="684" x2="648" y2="684" stroke="#dddddd" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="56" y1="1014" x2="648" y2="1014" stroke="#dddddd" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="56" y1="1304" x2="648" y2="1304" stroke="#dddddd" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ── ENTRY ── -->
  <!-- Matchmaking accepted -->
  <rect x="240" y="52" width="200" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="340" y="74" text-anchor="middle" dominant-baseline="central">Matchmaking accepted</text>

  <line x1="340" y1="96" x2="340" y2="118" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Champion select loads -->
  <rect x="240" y="118" width="200" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">Champion select loads</text>

  <line x1="340" y1="162" x2="340" y2="184" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── INTENT ── -->
  <!-- Intent prompt (NEW) -->
  <rect x="210" y="184" width="260" height="56" rx="8" fill="#FFF3CC" stroke="#EF9F27" stroke-width="1"/>
  <text class="th" x="340" y="204" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Intent prompt appears</text>
  <text class="ts" x="340" y="224" text-anchor="middle" dominant-baseline="central" fill="#a06800">New — optional, one tap</text>

  <line x1="340" y1="240" x2="340" y2="264" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision diamond: Player sets intent? -->
  <polygon points="340,264 406,288 340,312 274,288" fill="#ffffff" stroke="#888888" stroke-width="0.5"/>
  <text class="ts" x="340" y="285" text-anchor="middle" dominant-baseline="central" fill="#444444">Player sets</text>
  <text class="ts" x="340" y="299" text-anchor="middle" dominant-baseline="central" fill="#444444">intent?</text>

  <!-- Yes branch right -->
  <line x1="406" y1="288" x2="496" y2="288" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="448" y="281" text-anchor="middle" fill="#666666">Yes</text>
  <rect x="496" y="266" width="116" height="44" rx="8" fill="#FFF3CC" stroke="#EF9F27" stroke-width="1"/>
  <text class="th" x="554" y="288" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Token set</text>
  <path d="M554 310 L554 368 L340 368" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- No branch left -->
  <line x1="274" y1="288" x2="180" y2="288" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="229" y="281" text-anchor="middle" fill="#666666">Skip</text>
  <rect x="64" y="266" width="116" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="122" y="288" text-anchor="middle" dominant-baseline="central">No token shown</text>
  <path d="M122 310 L122 368 L340 368" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- All tokens visible -->
  <rect x="200" y="344" width="280" height="56" rx="8" fill="#FFF3CC" stroke="#EF9F27" stroke-width="1"/>
  <text class="th" x="340" y="364" text-anchor="middle" dominant-baseline="central" fill="#7a5000">All tokens visible to team</text>
  <text class="ts" x="340" y="384" text-anchor="middle" dominant-baseline="central" fill="#a06800">Slots show intent or blank</text>

  <line x1="340" y1="400" x2="340" y2="424" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── BAN PHASE ── -->
  <rect x="230" y="432" width="220" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="340" y="454" text-anchor="middle" dominant-baseline="central">Ban phase begins</text>

  <line x1="340" y1="476" x2="340" y2="500" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: my ban turn? -->
  <polygon points="340,500 406,524 340,548 274,524" fill="#ffffff" stroke="#888888" stroke-width="0.5"/>
  <text class="ts" x="340" y="521" text-anchor="middle" dominant-baseline="central" fill="#444444">My ban</text>
  <text class="ts" x="340" y="535" text-anchor="middle" dominant-baseline="central" fill="#444444">turn?</text>

  <!-- Yes -->
  <line x1="406" y1="524" x2="506" y2="524" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="454" y="517" text-anchor="middle" fill="#666666">Yes</text>
  <rect x="506" y="502" width="120" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="566" y="524" text-anchor="middle" dominant-baseline="central">Ban champion</text>
  <path d="M566 546 L566 600 L340 600" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- No -->
  <line x1="274" y1="524" x2="174" y2="524" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="226" y="517" text-anchor="middle" fill="#666666">No</text>
  <rect x="64" y="502" width="110" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="119" y="524" text-anchor="middle" dominant-baseline="central">Watch + wait</text>
  <path d="M119 546 L119 600 L340 600" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- All bans complete -->
  <rect x="220" y="576" width="240" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="340" y="598" text-anchor="middle" dominant-baseline="central">All 10 bans complete</text>

  <line x1="340" y1="620" x2="340" y2="644" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── PICK PHASE ── -->
  <rect x="230" y="644" width="220" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="340" y="666" text-anchor="middle" dominant-baseline="central">Pick phase begins</text>

  <line x1="340" y1="688" x2="340" y2="712" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: my pick turn? -->
  <polygon points="340,712 406,736 340,760 274,736" fill="#ffffff" stroke="#888888" stroke-width="0.5"/>
  <text class="ts" x="340" y="733" text-anchor="middle" dominant-baseline="central" fill="#444444">My pick</text>
  <text class="ts" x="340" y="747" text-anchor="middle" dominant-baseline="central" fill="#444444">turn?</text>

  <!-- No -->
  <line x1="274" y1="736" x2="174" y2="736" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="226" y="729" text-anchor="middle" fill="#666666">No</text>
  <rect x="64" y="714" width="110" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="119" y="736" text-anchor="middle" dominant-baseline="central">Watch team</text>
  <path d="M119 758 L119 816 L274 816" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Yes — counter-picking? -->
  <line x1="406" y1="736" x2="504" y2="736" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="452" y="729" text-anchor="middle" fill="#666666">Yes</text>

  <polygon points="556,736 612,760 556,784 500,760" fill="#ffffff" stroke="#888888" stroke-width="0.5"/>
  <text class="ts" x="556" y="757" text-anchor="middle" dominant-baseline="central" fill="#444444">Counter-</text>
  <text class="ts" x="556" y="771" text-anchor="middle" dominant-baseline="central" fill="#444444">picking?</text>

  <!-- Yes counter -->
  <path d="M556 784 L556 816 L406 816" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="592" y="800" text-anchor="start" fill="#666666">Yes</text>

  <!-- No counter -->
  <line x1="612" y1="760" x2="644" y2="760" stroke="#aaaaaa" stroke-width="1.5"/>
  <path d="M644 760 L644 848 L406 848" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="628" y="753" text-anchor="start" fill="#666666">No</text>

  <!-- Hover champion -->
  <rect x="274" y="794" width="132" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="340" y="816" text-anchor="middle" dominant-baseline="central">Hover champion</text>

  <!-- Lock in champion -->
  <rect x="274" y="826" width="132" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="340" y="848" text-anchor="middle" dominant-baseline="central">Lock in champion</text>

  <line x1="340" y1="870" x2="340" y2="894" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: structural gap + flex? (NEW) -->
  <polygon points="340,894 420,918 340,942 260,918" fill="#fff8ff" stroke="#534AB7" stroke-width="0.8"/>
  <text class="ts" x="340" y="915" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Structural gap</text>
  <text class="ts" x="340" y="929" text-anchor="middle" dominant-baseline="central" fill="#3C3489">+ flex player?</text>

  <!-- Yes nudge -->
  <line x1="420" y1="918" x2="506" y2="918" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="461" y="911" text-anchor="middle" fill="#666666">Yes</text>
  <rect x="506" y="896" width="130" height="44" rx="8" fill="#FFF3CC" stroke="#EF9F27" stroke-width="1"/>
  <text class="th" x="571" y="909" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Soft nudge</text>
  <text class="ts" x="571" y="925" text-anchor="middle" dominant-baseline="central" fill="#a06800">amber, dismissible</text>
  <path d="M571 940 L571 968 L340 968" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- No nudge -->
  <line x1="260" y1="918" x2="174" y2="918" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="219" y="911" text-anchor="middle" fill="#666666">No gap</text>
  <rect x="64" y="896" width="110" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="119" y="918" text-anchor="middle" dominant-baseline="central">No nudge shown</text>
  <path d="M119 940 L119 968 L340 968" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- All 5 locked? -->
  <polygon points="340,968 406,992 340,1016 274,992" fill="#ffffff" stroke="#888888" stroke-width="0.5"/>
  <text class="ts" x="340" y="989" text-anchor="middle" dominant-baseline="central" fill="#444444">All 5</text>
  <text class="ts" x="340" y="1003" text-anchor="middle" dominant-baseline="central" fill="#444444">locked?</text>

  <!-- Not yet — loop -->
  <line x1="406" y1="992" x2="628" y2="992" stroke="#aaaaaa" stroke-width="1.5"/>
  <path d="M628 992 L628 706 L406 706" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="622" y="848" text-anchor="end" fill="#666666">Next pick</text>

  <!-- Yes all locked -->
  <line x1="340" y1="1016" x2="340" y2="1040" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── POST-LOCK ── -->
  <rect x="215" y="1040" width="250" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="340" y="1062" text-anchor="middle" dominant-baseline="central">All champions locked</text>

  <line x1="340" y1="1084" x2="340" y2="1108" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Playstyle prompt (NEW) -->
  <rect x="195" y="1108" width="290" height="56" rx="8" fill="#FFF3CC" stroke="#EF9F27" stroke-width="1"/>
  <text class="th" x="340" y="1128" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Playstyle prompt appears</text>
  <text class="ts" x="340" y="1148" text-anchor="middle" dominant-baseline="central" fill="#a06800">New — aggressive / scale / roam / peel</text>

  <line x1="340" y1="1164" x2="340" y2="1188" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: sets playstyle? -->
  <polygon points="340,1188 406,1212 340,1236 274,1212" fill="#ffffff" stroke="#888888" stroke-width="0.5"/>
  <text class="ts" x="340" y="1209" text-anchor="middle" dominant-baseline="central" fill="#444444">Sets play-</text>
  <text class="ts" x="340" y="1223" text-anchor="middle" dominant-baseline="central" fill="#444444">style?</text>

  <!-- Yes -->
  <line x1="406" y1="1212" x2="506" y2="1212" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="454" y="1205" text-anchor="middle" fill="#666666">Yes</text>
  <rect x="506" y="1190" width="120" height="44" rx="8" fill="#FFF3CC" stroke="#EF9F27" stroke-width="1"/>
  <text class="th" x="566" y="1212" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Token recorded</text>
  <path d="M566 1234 L566 1278 L340 1278" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- No -->
  <line x1="274" y1="1212" x2="174" y2="1212" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="226" y="1205" text-anchor="middle" fill="#666666">Skip</text>
  <rect x="64" y="1190" width="110" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="119" y="1212" text-anchor="middle" dominant-baseline="central">No token shown</text>
  <path d="M119 1234 L119 1278 L340 1278" fill="none" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── LOADING SCREEN ── -->
  <rect x="195" y="1254" width="290" height="56" rx="8" fill="#FFF3CC" stroke="#EF9F27" stroke-width="1"/>
  <text class="th" x="340" y="1274" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Loading screen</text>
  <text class="ts" x="340" y="1294" text-anchor="middle" dominant-baseline="central" fill="#a06800">Intent tokens visible to all</text>

  <line x1="340" y1="1310" x2="340" y2="1334" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── GAME ── -->
  <rect x="230" y="1334" width="220" height="44" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="th" x="340" y="1356" text-anchor="middle" dominant-baseline="central">Game begins</text>

  <line x1="340" y1="1378" x2="340" y2="1402" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Outcome -->
  <rect x="185" y="1402" width="310" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="th" x="340" y="1422" text-anchor="middle" dominant-baseline="central" fill="#085041">Team enters aligned</text>
  <text class="ts" x="340" y="1442" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Shared mental model established</text>

  <!-- LEGEND -->
  <rect x="64" y="1494" width="12" height="12" rx="2" fill="#FFF3CC" stroke="#EF9F27" stroke-width="1"/>
  <text class="ts" x="82" y="1504" fill="#555555">New feature in proposed system</text>
  <rect x="256" y="1494" width="12" height="12" rx="2" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text class="ts" x="274" y="1504" fill="#555555">Existing step</text>
  <rect x="368" y="1494" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="ts" x="386" y="1504" fill="#555555">Improved outcome</text>

  <!-- TITLE -->
  <text style="font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:18px;font-weight:700;fill:#1a1a1a" x="340" y="1548" text-anchor="middle">Champion select intent system — user flow</text>
  <text style="font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:400;fill:#888888" x="340" y="1566" text-anchor="middle">League of Legends · UX Concept · Kevina Seo · 2025</text>
</svg>
