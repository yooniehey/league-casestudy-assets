<svg width="680" height="760" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
      .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .ts { font-size: 12px; font-weight: 400; fill: #555555; }
      .tinner { font-size: 13px; font-weight: 600; }
      .tsub { font-size: 11px; font-weight: 400; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="760" fill="#fafafa"/>

  <!-- ── OUTER CONTAINER ── -->
  <rect x="32" y="32" width="616" height="608" rx="16" fill="#f5f5f5" stroke="#dddddd" stroke-width="1"/>
  <text class="th" x="52" y="60" dominant-baseline="central" style="font-size:15px;font-weight:700;fill:#1a1a1a">Champion select intent system</text>

  <!-- ── LAYER 1: DRAFT INTENT TOKENS ── -->
  <rect x="52" y="80" width="576" height="168" rx="10" fill="#FFF3CC" stroke="#EF9F27" stroke-width="1"/>
  <text class="tinner" x="72" y="104" dominant-baseline="central" fill="#7a5000">Layer 1 — Draft intent tokens</text>
  <text class="tsub" x="72" y="122" dominant-baseline="central" fill="#a06800">Entry · optional · one tap · visible to all teammates instantly</text>

  <!-- One-trick -->
  <rect x="68" y="136" width="126" height="96" rx="6" fill="#FFE680" stroke="#EF9F27" stroke-width="0.8"/>
  <text class="tinner" x="131" y="166" text-anchor="middle" dominant-baseline="central" fill="#7a5000">One-trick</text>
  <text class="tsub" x="131" y="186" text-anchor="middle" dominant-baseline="central" fill="#7a5000">I'm playing this</text>
  <text class="tsub" x="131" y="202" text-anchor="middle" dominant-baseline="central" fill="#7a5000">regardless</text>
  <text class="tsub" x="131" y="218" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Build around me</text>

  <!-- Flexible -->
  <rect x="210" y="136" width="126" height="96" rx="6" fill="#FFE680" stroke="#EF9F27" stroke-width="0.8"/>
  <text class="tinner" x="273" y="166" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Flexible</text>
  <text class="tsub" x="273" y="186" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Tell me what</text>
  <text class="tsub" x="273" y="202" text-anchor="middle" dominant-baseline="central" fill="#7a5000">the team needs</text>
  <text class="tsub" x="273" y="218" text-anchor="middle" dominant-baseline="central" fill="#7a5000">I'll adapt</text>

  <!-- Counter-pick -->
  <rect x="352" y="136" width="136" height="96" rx="6" fill="#FFE680" stroke="#EF9F27" stroke-width="0.8"/>
  <text class="tinner" x="420" y="166" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Counter-pick</text>
  <text class="tsub" x="420" y="186" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Waiting to see</text>
  <text class="tsub" x="420" y="202" text-anchor="middle" dominant-baseline="central" fill="#7a5000">their pick first</text>
  <text class="tsub" x="420" y="218" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Don't rush me</text>

  <!-- Autofilled -->
  <rect x="504" y="136" width="112" height="96" rx="6" fill="#FFE680" stroke="#EF9F27" stroke-width="0.8"/>
  <text class="tinner" x="560" y="166" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Autofilled</text>
  <text class="tsub" x="560" y="186" text-anchor="middle" dominant-baseline="central" fill="#7a5000">Not comfortable</text>
  <text class="tsub" x="560" y="202" text-anchor="middle" dominant-baseline="central" fill="#7a5000">here — please</text>
  <text class="tsub" x="560" y="218" text-anchor="middle" dominant-baseline="central" fill="#7a5000">adjust expectations</text>

  <!-- Arrow Layer 1 to Layer 2 -->
  <line x1="340" y1="248" x2="340" y2="272" stroke="#EF9F27" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="tsub" x="348" y="262" fill="#EF9F27" dominant-baseline="central">feeds into</text>

  <!-- ── LAYER 2: CONFLICT DETECTION ── -->
  <rect x="52" y="272" width="576" height="164" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text class="tinner" x="72" y="296" dominant-baseline="central" fill="#26215C">Layer 2 — Conflict detection logic</text>
  <text class="tsub" x="72" y="314" dominant-baseline="central" fill="#534AB7">Pick phase · reads tokens + emerging comp · targets flex player only · soft amber nudge</text>

  <!-- Reads comp -->
  <rect x="68" y="330" width="152" height="90" rx="6" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.8"/>
  <text class="tinner" x="144" y="355" text-anchor="middle" dominant-baseline="central" fill="#26215C">Reads comp</text>
  <text class="tsub" x="144" y="374" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Tank · engage · carries</text>
  <text class="tsub" x="144" y="390" text-anchor="middle" dominant-baseline="central" fill="#3C3489">utility · per slot</text>

  <!-- Arrow -->
  <line x1="220" y1="375" x2="244" y2="375" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Gap detected? -->
  <rect x="244" y="330" width="152" height="90" rx="6" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.8"/>
  <text class="tinner" x="320" y="355" text-anchor="middle" dominant-baseline="central" fill="#26215C">Gap detected?</text>
  <text class="tsub" x="320" y="374" text-anchor="middle" dominant-baseline="central" fill="#3C3489">No tank / no CC</text>
  <text class="tsub" x="320" y="390" text-anchor="middle" dominant-baseline="central" fill="#3C3489">triple carry etc</text>

  <!-- Arrow -->
  <line x1="396" y1="375" x2="420" y2="375" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Flex in last slot? -->
  <rect x="420" y="330" width="196" height="90" rx="6" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.8"/>
  <text class="tinner" x="518" y="349" text-anchor="middle" dominant-baseline="central" fill="#26215C">Flex player in</text>
  <text class="tinner" x="518" y="366" text-anchor="middle" dominant-baseline="central" fill="#26215C">last slot?</text>
  <text class="tsub" x="518" y="385" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Only then show</text>
  <text class="tsub" x="518" y="401" text-anchor="middle" dominant-baseline="central" fill="#3C3489">amber nudge</text>

  <!-- Arrow Layer 2 to Layer 3 -->
  <line x1="340" y1="436" x2="340" y2="460" stroke="#7F77DD" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="tsub" x="348" y="450" fill="#7F77DD" dominant-baseline="central">feeds into</text>

  <!-- ── LAYER 3: PLAYSTYLE SIGNAL ── -->
  <rect x="52" y="460" width="576" height="164" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="tinner" x="72" y="484" dominant-baseline="central" fill="#04342C">Layer 3 — Playstyle signal</text>
  <text class="tsub" x="72" y="502" dominant-baseline="central" fill="#0F6E56">Post-lock · visible on loading screen · non-binding · language-agnostic</text>

  <!-- Aggressive -->
  <rect x="68" y="518" width="124" height="88" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text class="tinner" x="130" y="543" text-anchor="middle" dominant-baseline="central" fill="#04342C">Aggressive</text>
  <text class="tsub" x="130" y="562" text-anchor="middle" dominant-baseline="central" fill="#085041">Play for early</text>
  <text class="tsub" x="130" y="578" text-anchor="middle" dominant-baseline="central" fill="#085041">game pressure</text>

  <!-- Scaling -->
  <rect x="208" y="518" width="124" height="88" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text class="tinner" x="270" y="543" text-anchor="middle" dominant-baseline="central" fill="#04342C">Scaling</text>
  <text class="tsub" x="270" y="562" text-anchor="middle" dominant-baseline="central" fill="#085041">Protect me early</text>
  <text class="tsub" x="270" y="578" text-anchor="middle" dominant-baseline="central" fill="#085041">I'll carry late</text>

  <!-- Roaming -->
  <rect x="348" y="518" width="140" height="88" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text class="tinner" x="418" y="543" text-anchor="middle" dominant-baseline="central" fill="#04342C">Roaming</text>
  <text class="tsub" x="418" y="562" text-anchor="middle" dominant-baseline="central" fill="#085041">Cover my lane</text>
  <text class="tsub" x="418" y="578" text-anchor="middle" dominant-baseline="central" fill="#085041">while I roam</text>

  <!-- Need peel -->
  <rect x="504" y="518" width="112" height="88" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text class="tinner" x="560" y="543" text-anchor="middle" dominant-baseline="central" fill="#04342C">Need peel</text>
  <text class="tsub" x="560" y="562" text-anchor="middle" dominant-baseline="central" fill="#085041">Stay close</text>
  <text class="tsub" x="560" y="578" text-anchor="middle" dominant-baseline="central" fill="#085041">protect me</text>

  <!-- Arrow to outcome -->
  <line x1="340" y1="632" x2="340" y2="656" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- OUTCOME -->
  <rect x="168" y="656" width="344" height="60" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text class="tinner" x="340" y="678" text-anchor="middle" dominant-baseline="central" fill="#04342C">Team enters game aligned</text>
  <text class="tsub" x="340" y="698" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Shared mental model · no text required · language-agnostic</text>

  <!-- LEGEND -->
  <rect x="52" y="700" width="12" height="12" rx="2" fill="#FFE680" stroke="#EF9F27" stroke-width="1"/>
  <text class="tsub" x="70" y="710" fill="#555555">Layer 1 — Draft intent</text>
  <rect x="224" y="700" width="12" height="12" rx="2" fill="#CECBF6" stroke="#7F77DD" stroke-width="1"/>
  <text class="tsub" x="242" y="710" fill="#555555">Layer 2 — Conflict logic</text>
  <rect x="396" y="700" width="12" height="12" rx="2" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
  <text class="tsub" x="414" y="710" fill="#555555">Layer 3 — Playstyle signal</text>

  <!-- TITLE -->
  <text style="font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:18px;font-weight:700;fill:#1a1a1a" x="340" y="736" text-anchor="middle">Champion select intent system — structural diagram</text>
  <text style="font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:400;fill:#888888" x="340" y="754" text-anchor="middle">League of Legends · UX Concept · Kevina Seo · 2025</text>
</svg>
